name: Test Book

on:
  push:
    branches:
      - main
      - discussion
  pull_request:
    branches:
      - main
      - discussion

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run build script
        run: |
          chmod +x f.Scripts/combine-book.sh
          ./f.Scripts/combine-book.sh

      - name: Verify build output
        run: |
          # Check that the combined book file was created
          if ls e.Combined-Book/The-Last-Light_Combined_NoExtras_*.md 1> /dev/null 2>&1; then
            echo "Build output verified"
          else
            echo "Build output not found"
            exit 1
          fi

      - name: Check for broken links
        run: |
          # Simple check for obvious broken link patterns in legacy archive
          ! grep -r "\[.*\](.*\.md)" --include="*.md" archive/legacy-manuscript d.References || echo "Warning: Relative markdown links found in archive, these may not work on GitHub Pages"

  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate directory structure
        run: |
          # Check that expected directories exist
          test -d "archive/legacy-manuscript" || { echo "Missing archive/legacy-manuscript directory"; exit 1; }
          test -d "e.Combined-Book" || { echo "Missing e.Combined-Book directory"; exit 1; }
          test -d "f.Scripts" || { echo "Missing f.Scripts directory"; exit 1; }
          test -d "flemish-market" || { echo "Missing flemish-market directory"; exit 1; }

          # Check that required files exist
          test -f "The-Last-Light.md" || { echo "Missing The-Last-Light.md"; exit 1; }
          test -f "index.html" || { echo "Missing index.html"; exit 1; }
          test -f "README.md" || { echo "Missing README.md"; exit 1; }
          test -f "PROJECT_README.md" || { echo "Missing PROJECT_README.md"; exit 1; }

          echo "Directory structure validated"

  validate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check for required content elements
        run: |
          # Check that canonical manuscript exists and contains the title
          test -f "The-Last-Light.md" || { echo "Missing canonical manuscript"; exit 1; }
          grep -q "# The Last Light: How to Stay Human When Everything Can Be Outsourced" "The-Last-Light.md" || { echo "Canonical manuscript missing title"; exit 1; }

          echo "Content validation passed"
